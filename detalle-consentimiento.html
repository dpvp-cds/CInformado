<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Consentimiento - CInformado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #F8F7F2; color: #4A4A4A; }
        h1, h2, h3 { font-family: 'Poppins', sans-serif; color: #1a1a1a; font-weight: 700; }
        .card { background-color: white; border-radius: 16px; padding: 2.5rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .detail-item { border-bottom: 1px solid #e5e7eb; padding: 0.75rem 0; display: grid; grid-template-columns: 180px 1fr; gap: 1rem; align-items: start; }
        .detail-item:last-child { border-bottom: none; }
        .detail-label { font-weight: 600; color: #4b5563; }
        .prose p { text-align: justify; }
    </style>
</head>
<body class="bg-gray-50">
    <header class="bg-white shadow-sm">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="portal-consentimientos.html" class="text-sm font-medium text-gray-600 hover:text-[#003366] flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                Volver al Portal
            </a>
            <button id="logoutButton" class="text-sm font-medium text-gray-600 hover:text-[#003366]">Cerrar Sesión</button>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12">
        <div id="loading" class="text-center py-20">
            <h1 class="text-3xl">Cargando detalle del consentimiento...</h1>
        </div>

        <div id="reportContent" class="hidden space-y-8">
            <h1 id="reportTitle" class="text-4xl font-bold text-center">Detalle del Consentimiento</h1>
            
            <div id="dynamic-content"></div>

        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem('consultorAuth') !== 'true') {
                window.location.href = 'login.html'; return;
            }
            document.getElementById('logoutButton').addEventListener('click', () => {
                sessionStorage.removeItem('consultorAuth');
                window.location.href = 'login.html';
            });
            fetchReport();
        });

        async function fetchReport() {
            const loadingDiv = document.getElementById('loading');
            const reportContentDiv = document.getElementById('reportContent');
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (!id) {
                loadingDiv.innerHTML = '<h1 class="text-3xl text-red-600">ID de consentimiento no proporcionado.</h1>';
                return;
            }

            try {
                const response = await fetch(`/api/get-consentimiento-individual?id=${id}`);
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || 'No se pudo cargar el consentimiento.');
                }
                const reporte = await response.json();
                
                const esPareja = reporte.demograficos?.tipoTerapia === 'Pareja';
                if (esPareja) {
                    displayReportePareja(reporte);
                } else {
                    displayReporteIndividual(reporte);
                }

                loadingDiv.classList.add('hidden');
                reportContentDiv.classList.remove('hidden');

            } catch (error) {
                console.error("Error al cargar el reporte individual:", error);
                loadingDiv.innerHTML = `<h1 class="text-3xl text-red-600">Error: ${error.message}</h1>`;
            }
        }
        
        function createDetailItem(label, value) {
            if (!value && value !== 0) return '';
            return `<div class="detail-item"><span class="detail-label">${label}:</span> <span>${value}</span></div>`;
        }
        
        function displayReporteIndividual(reporte) {
            const { demograficos, consentimiento, firmaDigital, fecha } = reporte;
            document.getElementById('reportTitle').textContent += ` de ${demograficos.nombre}`;
            const dynamicContent = document.getElementById('dynamic-content');
            const fechaFormateada = new Date(fecha).toLocaleString('es-CO', { dateStyle: 'full', timeStyle: 'short' });
            
            const esMenor = parseInt(demograficos.edad, 10) < 18;
            const modalidad = demograficos.modalidadSesion || 'No especificada';

            const textos = {
                intro: esMenor ? `Yo, ${demograficos.nombreAcudiente}, con documento ${demograficos.documentoAcudiente}, como ${demograficos.tipoAcudiente} de ${demograficos.nombre} (doc ${demograficos.documentoIdentidad}), declaro que:` : `Yo, ${demograficos.nombre}, con documento ${demograficos.documentoIdentidad}, declaro que:`,
                confidencialidad: 'Entiendo, acepto y soy consciente del trabajo profesional que realizará el psicólogo designado, y que este guardará una confidencialidad absoluta con el (la) paciente, la cual será inviolable, salvo que su integridad física se vea amenazada, y salvo los requerimientos de ley que así mismo pidan levantar la reserva profesional.',
                proposito: 'El propósito es realizar una evaluación y/o intervención psicológica, la cual se llevará a cabo utilizando técnicas y enfoques validados por la psicología como ciencia.',
                naturaleza: 'Se me ha informado que el proceso puede incluir entrevistas, pruebas psicométricas y tareas inter-sesión, y que mi participación activa es fundamental para el éxito del mismo.',
                evaluacion: esMenor ? 'Autorizo que le sean practicadas pruebas psicométricas y demás herramientas diagnósticas que el psicólogo designado así considere necesario, a fin de establecer cabal y puntualmente un diagnóstico asertivo sobre el motivo de consulta del (la) paciente menor de edad en consulta.' : 'Autorizo que sean practicadas pruebas psicométricas y demás herramientas diagnósticas que el psicólogo designado así considere necesario, a fin de establecer cabal y puntualmente un diagnóstico asertivo sobre el motivo de consulta.',
                costos: esMenor ? 'Me comprometo como acudiente del (la) paciente menor de edad, a cubrir todos los gastos económicos en que se incurra con motivo de la atención que recibirá, habiendo recibido la información de forma clara y oportuna y habiendo tenido la oportunidad de aceptar o rechazar dichas atenciones psicológicas y los costos asociados.' : 'Me comprometo a cubrir todos los gastos económicos en que se incurra con motivo de la atención que recibiré, habiendo recibido la información de forma clara y oportuna y habiendo tenido la oportunidad de aceptar o rechazar dichas atenciones psicológicas y los costos asociados.',
                datos: 'Autorizo el tratamiento de mis datos personales de acuerdo con la Ley 1581 de 2012 y la política de tratamiento de datos de "Caminos del Ser", la cual he podido consultar.',
                declaracionFinal: (esMenor ? `Declaro y doy fe de que yo, ${demograficos.nombreAcudiente}, en mi calidad de acudiente de ${demograficos.nombre}, he` : `Declaro y doy fe de que yo, ${demograficos.nombre}, he`) + ` leído y comprendido este documento durante una sesión <strong>${modalidad}</strong> con el Psicólogo Jorge Arango Castaño, donde se me ha garantizado un espacio para hacer preguntas, las cuales han sido respondidas a mi entera satisfacción.`
            };

            let acudienteHtml = '';
            if (esMenor && demograficos.nombreAcudiente) {
                acudienteHtml = `<div class="card">${/* ... (código acudiente sin cambios) ... */''}</div>`;
            }
            
            dynamicContent.innerHTML = `
                <div class="card mb-8">
                    <h2 class="text-2xl font-bold border-b pb-3 mb-6">Términos del Consentimiento Aceptado</h2>
                    <div class="prose max-w-none space-y-4 text-gray-700 text-sm">
                        <p>${textos.intro}</p>
                        <div class="space-y-2"><h4 class="font-bold">Confidencialidad:</h4><p>${textos.confidencialidad}</p></div>
                        <div class="space-y-2"><h4 class="font-bold">Propósito de la Intervención:</h4><p>${textos.proposito}</p></div>
                        <div class="space-y-2"><h4 class="font-bold">Naturaleza del Proceso:</h4><p>${textos.naturaleza}</p></div>
                        <div class="space-y-2"><h4 class="font-bold">Proceso de evaluación:</h4><p>${textos.evaluacion}</p></div>
                        <div class="space-y-2"><h4 class="font-bold">Costos económicos:</h4><p>${textos.costos}</p></div>
                        <div class="space-y-2"><h4 class="font-bold">Tratamiento de Datos:</h4><p>${textos.datos}</p></div>
                        <div class="mt-6 pt-6 border-t"><h4 class="font-bold">Declaración y Modalidad de la Sesión:</h4><p>${textos.declaracionFinal}</p></div>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="card">${/* ... (código info paciente sin cambios) ... */''}</div>
                    <div class="space-y-8">${/* ... (código firma y metadatos sin cambios) ... */''}</div>
                </div>
                ${acudienteHtml}
            `;
        }

        function displayReportePareja(reporte) {
            const { demograficos, consentimiento, firmas, fecha } = reporte;
            document.getElementById('reportTitle').textContent = `Consentimiento de Pareja: ${demograficos.nombreCompleto1} y ${demograficos.nombreCompleto2}`;
            const dynamicContent = document.getElementById('dynamic-content');
            const fechaFormateada = new Date(fecha).toLocaleString('es-CO', { dateStyle: 'full', timeStyle: 'short' });
            const modalidad = demograficos.modalidadSesion || 'No especificada';

            const textos = {
                intro: `Nosotros, ${demograficos.nombreCompleto1}, identificado/a con documento de identidad ${demograficos.documentoIdentidad1}, y ${demograficos.nombreCompleto2}, identificado/a con documento de identidad ${demograficos.documentoIdentidad2}, declaramos que:`,
                confidencialidad1: 'Entendemos, aceptamos y somos conscientes del trabajo profesional que realizará el psicólogo designado, y que este guardará una confidencialidad absoluta con la pareja, la cual será inviolable, salvo que la integridad física de alguno de los miembros se vea amenazada, o la de terceros, y salvo los requerimientos de ley que así mismo pidan levantar la reserva profesional. La información compartida en sesiones individuales con cualquiera de los miembros podrá ser utilizada en la terapia conjunta si el terapeuta lo considera pertinente para el avance del proceso.',
                confidencialidad2: 'Entendemos y nos comprometemos a respetar la privacidad y confidencialidad que el psicólogo tendrá con el otro miembro de la relación. Es decir, ninguno podrá preguntarle al psicólogo sobre las sesiones individuales que se tenga con el otro y el psicólogo no podrá divulgar información confidencial y privada que se hable en las sesiones individuales sin la previa autorización expresa del miembro de la pareja involucrado.',
                proposito: 'El propósito es realizar una evaluación y/o intervención psicológica de pareja, la cual se llevará a cabo utilizando técnicas y enfoques validados por la psicología como ciencia para mejorar la dinámica y el bienestar de la relación.',
                naturaleza: 'Se nos ha informado que el proceso puede incluir entrevistas conjuntas e individuales, pruebas psicométricas y tareas inter-sesión, y que nuestra participación activa y honesta es fundamental para el éxito del mismo.',
                costos: 'Nos comprometemos a cubrir todos los gastos económicos en que se incurra con motivo de la atención que recibiremos, habiendo recibido la información de forma clara y oportuna y habiendo tenido la oportunidad de aceptar o rechazar dichas atenciones psicológicas y los costos asociados.',
                datos: 'Autorizamos el tratamiento de nuestros datos personales de acuerdo con la Ley 1581 de 2012 y la política de tratamiento de datos de "Caminos del Ser", la cual hemos podido consultar.',
                declaracionFinal: `Declaramos y damos fe de que nosotros, ${demograficos.nombreCompleto1} y ${demograficos.nombreCompleto2}, hemos leído y comprendido este documento durante una sesión <strong>${modalidad}</strong> con el Psicólogo Jorge Arango Castaño, donde se nos ha garantizado un espacio para hacer preguntas, las cuales han sido respondidas a nuestra entera satisfacción.`
            };

            dynamicContent.innerHTML = `
                <div class="card mb-8">
                     <h2 class="text-2xl font-bold border-b pb-3 mb-6">Términos del Consentimiento Aceptado</h2>
                    <div class="prose max-w-none space-y-4 text-gray-700 text-sm">
                        <p>${textos.intro}</p>
                        <div class="space-y-2"><h4 class="font-bold">4.1 Confidencialidad:</h4><p>${textos.confidencialidad1}</p><p>${textos.confidencialidad2}</p></div>
                        <div class="space-y-2"><h4 class="font-bold">4.2 Propósito de la Intervención:</h4><p>${textos.proposito}</p></div>
                        <div class="space-y-2"><h4 class="font-bold">4.3 Naturaleza del Proceso:</h4><p>${textos.naturaleza}</p></div>
                        <div class="space-y-2"><h4 class="font-bold">4.4 Costos económicos:</h4><p>${textos.costos}</p></div>
                        <div class="space-y-2"><h4 class="font-bold">4.5 Tratamiento de Datos:</h4><p>${textos.datos}</p></div>
                        <div class="mt-6 pt-6 border-t"><h4 class="font-bold">Declaración y Modalidad de la Sesión:</h4><p>${textos.declaracionFinal}</p></div>
                    </div>
                </div>
                <div class="space-y-8">${/* ... (código info pareja y firmas sin cambios) ... */''}</div>
            `;
        }
    </script>
</body>
</html>
