<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso a Terapeuta - CInformado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #F8F7F2;
            color: #4A4A4A;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex-grow: 1;
        }
        h1, h2, h3 {
            font-family: 'Poppins', sans-serif;
            color: #1a1a1a;
            font-weight: 700;
        }
        .btn-brand {
            background-color: #003366;
            color: white;
            padding: 12px 30px;
            border-radius: 9999px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .btn-brand:hover {
            background-color: #002244;
            transform: translateY(-2px);
            box-shadow: 0 7px 14px rgba(0, 0, 0, 0.1);
        }
        .btn-brand:disabled {
            background-color: #99aabb;
            cursor: not-allowed;
        }
        .card {
            background-color: white;
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .input-styled {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 10px 15px;
            width: 100%;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .input-styled:focus {
            outline: none;
            border-color: #003366;
            box-shadow: 0 0 0 2px rgba(0, 51, 102, 0.2);
        }
    </style>
</head>
<body class="antialiased">

    <header class="bg-white shadow-sm">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html">
                <img src="logoprincipal.png" alt="Caminos del Ser Logo" class="h-11 w-auto">
            </a>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12 flex items-center justify-center">
        <div class="w-full max-w-md">
            <div class="card">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold">Acceso a Terapeuta</h1>
                    <p class="text-gray-500 mt-2">Ingresa tus credenciales para continuar.</p>
                </div>
                <form id="loginForm">
                    <div class="mb-6">
                        <label for="password" class="block mb-2 font-medium">Contraseña</label>
                        <input type="password" id="password" class="input-styled" required>
                    </div>
                    <div id="errorMessage" class="text-red-600 text-center mb-4 hidden">Contraseña incorrecta.</div>
                    <button type="submit" id="submitButton" class="btn-brand w-full">Ingresar al Portal</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-[#1a1a1a] text-white py-8">
        <div class="container mx-auto text-center">
            <p class="text-gray-400">&copy; 2025 Jorge Arango Castaño - Caminos del Ser. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const passwordInput = document.getElementById('password');
            const errorMessage = document.getElementById('errorMessage');
            const submitButton = document.getElementById('submitButton');
            
            // Deshabilitar el botón y mostrar estado de carga
            submitButton.disabled = true;
            submitButton.textContent = 'Verificando...';
            errorMessage.classList.add('hidden');

            try {
                // --- INICIO DE LA LÓGICA SEGURA ---
                // 1. Enviar la contraseña al endpoint de la API para su verificación en el servidor.
                const response = await fetch('/api/authenticate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ password: passwordInput.value }),
                });

                // 2. Analizar la respuesta del servidor.
                if (response.ok) {
                    const data = await response.json();
                    if (data.success) {
                        // Si el servidor dice que la contraseña es correcta:
                        sessionStorage.setItem('consultorAuth', 'true');
                        window.location.href = 'portal-consentimientos.html';
                    }
                } else {
                    // Si el servidor responde con un error (ej. 401 No Autorizado), mostramos el mensaje.
                    errorMessage.classList.remove('hidden');
                }
                // --- FIN DE LA LÓGICA SEGURA ---

            } catch (error) {
                // Manejar errores de red (ej. sin conexión a internet)
                console.error('Error de red al autenticar:', error);
                errorMessage.textContent = 'Error de conexión. Inténtalo de nuevo.';
                errorMessage.classList.remove('hidden');
            } finally {
                // Volver a habilitar el botón y restaurar su texto
                submitButton.disabled = false;
                submitButton.textContent = 'Ingresar al Portal';
                passwordInput.value = '';
                passwordInput.focus();
            }
        });
    </script>

</body>
</html>
