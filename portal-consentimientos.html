<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Consentimientos - CInformado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #F8F7F2; color: #4A4A4A; }
        h1 { font-family: 'Poppins', sans-serif; color: #1a1a1a; font-weight: 700; }
        .card { background-color: white; border-radius: 16px; padding: 2rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .consent-item { 
            transition: background-color 0.2s ease-in-out, opacity 0.5s ease;
            border-bottom: 1px solid #e5e7eb;
        }
        .consent-item:hover { background-color: #fafafa; }
        .consent-item:last-child { border-bottom: none; }
    </style>
</head>
<body class="bg-gray-50">
    <header class="bg-white shadow-sm">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html">
                <img src="logoprincipal.png" alt="Caminos del Ser Logo" class="h-11 w-auto">
            </a>
            <button id="logoutButton" class="text-sm font-medium text-gray-600 hover:text-[#003366]">Cerrar Sesión</button>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold">Portal de Consentimientos</h1>
            </div>

            <div class="card">
                <div id="loading" class="text-center py-10">
                    <p class="text-lg">Cargando consentimientos...</p>
                </div>
                <div id="consentList" class="hidden">
                    </div>
                 <div id="noConsents" class="hidden text-center py-10">
                    <p class="text-lg text-gray-500">Aún no se han recibido consentimientos firmados o no hay expedientes activos.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const isAuthenticated = sessionStorage.getItem('consultorAuth');
            if (isAuthenticated !== 'true') {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('logoutButton').addEventListener('click', async () => {
                sessionStorage.removeItem('consultorAuth');
                // Opcional: Llamada al backend para destruir la cookie HttpOnly
                try { await fetch('/api/authenticate?action=logout'); } catch(e) {}
                window.location.href = 'login.html';
            });

            fetchConsentimientos();
        });

        async function fetchConsentimientos() {
            const loadingDiv = document.getElementById('loading');
            const consentListDiv = document.getElementById('consentList');
            const noConsentsDiv = document.getElementById('noConsents');

            try {
                // 🛡️ CAMBIO MODO ZEN: Apuntamos al controlador maestro
                const response = await fetch('/api/consentimientos?action=getAll');
                if (!response.ok) {
                    throw new Error('Error al conectar con el servidor.');
                }
                const consentimientos = await response.json();

                loadingDiv.classList.add('hidden');

                if (consentimientos.length === 0) {
                    noConsentsDiv.classList.remove('hidden');
                } else {
                    let html = '<div class="divide-y divide-gray-200">';
                    consentimientos.forEach(consent => {
                        const fecha = new Date(consent.fecha).toLocaleString('es-CO', { 
                            day: '2-digit', month: 'long', year: 'numeric',
                            hour: '2-digit', minute: '2-digit'
                        });
                        // 🛡️ LEY 1090: Cambiamos botón rojo de eliminar por botón ámbar de archivar
                        html += `
                            <div class="consent-item p-4 flex justify-between items-center" id="consent-item-${consent.id}">
                                <a href="detalle-consentimiento.html?id=${consent.id}" class="flex-grow">
                                    <div>
                                        <p class="font-bold text-lg text-[#003366]">${consent.nombre}</p>
                                        <p class="text-sm text-gray-600">Email: ${consent.email}</p>
                                        <p class="text-xs text-gray-400 mt-1">Firmado el: ${fecha} | <span class="uppercase font-semibold text-indigo-600">${consent.tipo || 'Individual'}</span></p>
                                    </div>
                                </a>
                                <button onclick="archiveConsent('${consent.id}', '${consent.nombre.replace(/'/g, "\\'")}')" class="ml-4 p-2 rounded-full hover:bg-amber-100 transition-colors" title="Archivar Expediente (Ley 1090)">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" />
                                    </svg>
                                </button>
                            </div>
                        `;
                    });
                    html += '</div>';
                    
                    consentListDiv.innerHTML = html;
                    consentListDiv.classList.remove('hidden');
                }

            } catch (error) {
                console.error(error);
                loadingDiv.textContent = 'Error al cargar los consentimientos.';
            }
        }

        // 🛡️ NUEVA FUNCIÓN PARA ARCHIVAR (SOFT DELETE - LEY 1090)
        async function archiveConsent(id, nombre) {
            // 1. Pedir confirmación al usuario aclarando la custodia legal
            if (!confirm(`¿Estás seguro de que deseas archivar el expediente de ${nombre}?\n\nDesaparecerá de tu vista principal, pero se conservará seguro en la base de datos para cumplir con la custodia legal (Ley 1090).`)) {
                return;
            }

            try {
                // 2. Llamar al endpoint unificado con la acción archive
                const response = await fetch(`/api/consentimientos?action=archive`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id })
                });

                if (response.ok) {
                    // 3. Si tiene éxito, eliminar el elemento de la vista
                    const consentItem = document.getElementById(`consent-item-${id}`);
                    if (consentItem) {
                        consentItem.style.opacity = '0';
                        setTimeout(() => consentItem.remove(), 500); // Eliminar después de la animación
                    }
                } else {
                    const errorData = await response.json();
                    alert(`Error al archivar el consentimiento: ${errorData.message}`);
                }
            } catch (error) {
                console.error('Error de red al archivar:', error);
                alert('Hubo un error de conexión al intentar archivar el consentimiento.');
            }
        }
    </script>
</body>
</html>
