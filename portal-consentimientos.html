<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Consentimientos - CInformado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #F8F7F2; color: #4A4A4A; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <header class="bg-white shadow-sm">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <img src="logoprincipal.png" alt="Caminos del Ser Logo" class="h-10 w-auto">
            <div class="flex items-center space-x-6">
                <!-- NOVO BOTÃO: Calendário (Agenda) -->
                <a href="portal-citas.html" class="flex items-center text-indigo-700 font-bold hover:text-indigo-900 transition-colors bg-indigo-50 px-4 py-2 rounded-full border border-indigo-200 shadow-sm hidden md:flex">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    Agenda
                </a>

                <!-- BOTÃO EXISTENTE: Conexão ao Portal de Pagamentos -->
                <a href="portal-pagos.html" class="flex items-center text-green-700 font-bold hover:text-green-900 transition-colors bg-green-50 px-4 py-2 rounded-full border border-green-200 shadow-sm">
                    <span class="text-xl font-bold mr-2">$</span>
                    Control de Pagos
                </a>
                <span class="border-l h-6 border-gray-300"></span>
                <button id="logoutButton" class="text-sm font-bold text-red-600 hover:text-red-800 transition-colors">Cerrar Sesión</button>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-6 py-8">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-[#003366]">Centro de Gestión de Pacientes</h1>
            <div class="relative w-64">
                <input type="text" id="searchInput" placeholder="Buscar paciente..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#003366] focus:border-transparent">
                <svg class="w-5 h-5 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left text-gray-500">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th scope="col" class="px-6 py-4 font-bold">Paciente(s)</th>
                            <th scope="col" class="px-6 py-4 font-bold">Contacto (Email)</th>
                            <th scope="col" class="px-6 py-4 font-bold">Tipo</th>
                            <th scope="col" class="px-6 py-4 font-bold">Fecha de Firma</th>
                            <th scope="col" class="px-6 py-4 text-center font-bold">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="patientsTableBody">
                        <tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">Cargando pacientes...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let allPatients = [];

        document.addEventListener('DOMContentLoaded', () => {
            // Verificar autenticação do usuário
            if (sessionStorage.getItem('consultorAuth') !== 'true') {
                window.location.href = 'login.html';
                return;
            }
            
            document.getElementById('logoutButton').addEventListener('click', () => {
                sessionStorage.removeItem('consultorAuth');
                window.location.href = 'login.html';
            });

            // Lógica de busca de pacientes
            document.getElementById('searchInput').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = allPatients.filter(p => p.nombre.toLowerCase().includes(term) || p.email.toLowerCase().includes(term));
                renderPatients(filtered);
            });

            fetchConsentimientos();
        });

        async function fetchConsentimientos() {
            try {
                // Obter dados da API centralizada
                const response = await fetch('/api/consentimientos?action=getAll');
                allPatients = await response.json();
                
                // ORDENAR ALFABÉTICAMENTE DE LA A a la Z
                allPatients.sort((a, b) => a.nombre.localeCompare(b.nombre));
                
                renderPatients(allPatients);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('patientsTableBody').innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-red-500">Error al cargar los datos.</td></tr>';
            }
        }

        function renderPatients(patients) {
            const tbody = document.getElementById('patientsTableBody');
            tbody.innerHTML = '';

            if (patients.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500 font-medium">No se encontraron pacientes registrados.</td></tr>';
                return;
            }

            patients.forEach(p => {
                const tr = document.createElement('tr');
                tr.className = 'bg-white border-b hover:bg-blue-50 transition-colors';
                
                const dateObj = new Date(p.fecha);
                const isPareja = p.tipo === 'pareja';
                const badgeClass = isPareja ? 'bg-purple-100 text-purple-800' : 'bg-blue-100 text-blue-800';
                
                tr.innerHTML = `
                    <td class="px-6 py-4 font-bold text-gray-900">${p.nombre}</td>
                    <td class="px-6 py-4">${p.email}</td>
                    <td class="px-6 py-4"><span class="px-2.5 py-1 text-xs font-semibold rounded-full ${badgeClass}">${isPareja ? 'Pareja' : 'Individual'}</span></td>
                    <td class="px-6 py-4">${dateObj.toLocaleDateString('es-CO')}</td>
                    <td class="px-6 py-4 text-center space-x-3">
                        <a href="historia-clinica.html?id=${p.id}" class="inline-flex items-center font-bold text-[#003366] hover:underline" title="Abrir Historia Clínica">
                            📖 Historia
                        </a>
                        <span class="text-gray-300">|</span>
                        <a href="detalle-consentimiento.html?id=${p.id}" class="inline-flex items-center font-medium text-blue-600 hover:underline" title="Ver Consentimiento Legal">
                            Consentimiento
                        </a>
                        <span class="text-gray-300">|</span>
                        <button onclick="deleteConsent('${p.id}')" class="font-medium text-red-600 hover:text-red-800" title="Eliminar definitivamente">
                            <svg class="w-5 h-5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function deleteConsent(id) {
            if (!confirm('¿Seguro que deseas eliminar este registro? Se perderán el consentimiento y la historia asociada.')) return;
            try {
                const response = await fetch(`/api/consentimientos?action=delete&id=${id}`, { method: 'DELETE' });
                if (response.ok) fetchConsentimientos();
            } catch (error) { alert('Error al eliminar'); }
        }
    </script>
</body>
</html>
