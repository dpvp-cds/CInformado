<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - CInformado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #F8F7F2; color: #4A4A4A; }
        .card { background-color: white; border-radius: 16px; padding: 1.5rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .btn-action { transition: all 0.2s; }
        .btn-action:hover { transform: translateY(-1px); }
    </style>
</head>
<body class="bg-gray-50">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <img src="logoprincipal.png" alt="Logo" class="h-10 w-auto">
                <h1 class="text-xl font-bold border-l pl-4 text-[#003366] hidden md:block">Centro de Gestión</h1>
            </div>
            <button id="logoutButton" class="text-sm font-medium text-red-600 hover:text-red-800 transition-colors">Cerrar Sesión</button>
        </div>
    </header>

    <main class="container mx-auto px-6 py-8">
        <div class="max-w-6xl mx-auto space-y-6">
            
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Mis Pacientes</h2>
                    <p class="text-sm text-gray-500">Gestión de consentimientos e historias clínicas.</p>
                </div>
                <div class="relative">
                    <input type="text" id="searchBar" placeholder="Buscar por nombre o email..." 
                           class="pl-10 pr-4 py-2 border rounded-full text-sm focus:ring-2 focus:ring-[#003366] outline-none w-full md:w-80">
                    <svg class="w-4 h-4 absolute left-3 top-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>

            <div class="card overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead>
                        <tr class="text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
                            <th class="px-6 py-3">Paciente</th>
                            <th class="px-6 py-3">Estado Legal</th>
                            <th class="px-6 py-3">Fecha Registro</th>
                            <th class="px-6 py-3 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="patientList" class="bg-white divide-y divide-gray-100 text-sm">
                        </tbody>
                </table>
                
                <div id="loading" class="text-center py-20">
                    <p class="text-gray-500 animate-pulse">Cargando base de datos...</p>
                </div>

                <div id="noData" class="hidden text-center py-20">
                    <p class="text-gray-500 italic">No se encontraron pacientes registrados.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        if (sessionStorage.getItem('consultorAuth') !== 'true') {
            window.location.href = 'login.html';
            return;
        }

        // ⚠️ REEMPLAZA EL BLOQUE DEL BOTÓN DE CERRAR SESIÓN CON ESTE:
        document.getElementById('logoutButton').addEventListener('click', () => {
            sessionStorage.removeItem('consultorAuth');
            
            // NUEVO: Barrido de seguridad para borrar borradores
            Object.keys(localStorage).forEach(key => { 
                if (key.startsWith('draft_')) localStorage.removeItem(key); 
            });
            
            window.location.href = 'login.html';
        });

        // (El resto de tu código sigue igual hacia abajo)

            fetchConsentimientos();
        });

        async function fetchConsentimientos() {
            try {
                const response = await fetch('/api/consentimientos?action=getAll');
                allPatients = await response.json();
                renderPatients(allPatients);
            } catch (error) {
                console.error(error);
                document.getElementById('loading').textContent = 'Error al conectar con el servidor.';
            }
        }

        function renderPatients(list) {
            const container = document.getElementById('patientList');
            const loading = document.getElementById('loading');
            const noData = document.getElementById('noData');
            
            loading.classList.add('hidden');
            container.innerHTML = '';

            if (list.length === 0) {
                noData.classList.remove('hidden');
                return;
            }
            noData.classList.add('hidden');

            list.forEach(patient => {
                const fecha = new Date(patient.fecha).toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric' });
                
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition-colors";
                tr.innerHTML = `
                    <td class="px-6 py-4">
                        <div class="font-bold text-[#003366]">${patient.nombre}</div>
                        <div class="text-xs text-gray-500">${patient.email}</div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 text-[10px] font-bold bg-green-100 text-green-700 rounded-full uppercase">Consentimiento Firmado</span>
                    </td>
                    <td class="px-6 py-4 text-gray-500">${fecha}</td>
                    <td class="px-6 py-4">
                        <div class="flex justify-center space-x-2">
                            <a href="detalle-consentimiento.html?id=${patient.id}" title="Ver Consentimiento" 
                               class="btn-action p-2 bg-gray-100 text-gray-600 rounded-lg hover:bg-[#003366] hover:text-white">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            </a>
                            <a href="historia-clinica.html?id=${patient.id}" title="Abrir Historia Clínica" 
                               class="btn-action p-2 bg-blue-50 text-[#003366] rounded-lg hover:bg-[#003366] hover:text-white border border-blue-100">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            </a>
                            <button onclick="deleteConsent('${patient.id}')" title="Eliminar" 
                                    class="btn-action p-2 text-red-400 hover:text-red-600">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </div>
                    </td>
                `;
                container.appendChild(tr);
            });
        }

        function filterPatients(query) {
            const filtered = allPatients.filter(p => 
                p.nombre.toLowerCase().includes(query.toLowerCase()) || 
                p.email.toLowerCase().includes(query.toLowerCase())
            );
            renderPatients(filtered);
        }

        async function deleteConsent(id) {
            if (!confirm('¿Seguro que deseas eliminar este registro? Se perderán el consentimiento y la historia asociada.')) return;
            try {
                const response = await fetch(`/api/consentimientos?action=delete&id=${id}`, { method: 'DELETE' });
                if (response.ok) fetchConsentimientos();
            } catch (error) { alert('Error al eliminar'); }
        }
    </script>
</body>
</html>
