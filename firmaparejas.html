<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Firma Parejas - Caminos del Ser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #F8F7F2; color: #4A4A4A; }
        .btn-brand { background-color: #003366; color: white; padding: 12px 30px; border-radius: 9999px; font-weight: 600; transition: all 0.3s ease; }
        .btn-brand:hover { background-color: #002244; }
        .btn-brand:disabled { background-color: #99aabb; cursor: not-allowed; }
        .card { background-color: white; border-radius: 16px; padding: 2rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .firma-canvas { border: 2px solid #003366; background-color: #fafbfc; border-radius: 8px; display: block; margin: 0 auto; touch-action: none; width: 100%; height: 150px; }
    </style>
</head>
<body class="antialiased">
    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="container mx-auto px-6 py-2 flex justify-between items-center">
            <a href="index.html"><img src="logoprincipal.png" alt="Caminos del Ser Logo" class="h-10"></a>
            <a href="parejas.html" class="text-sm text-gray-600 hover:text-[#003366]">Volver al Consentimiento</a>
        </div>
    </header>
    <main class="container mx-auto px-6 py-12">
        <div class="max-w-3xl mx-auto">
            <h1 class="text-3xl font-bold text-center mb-4">Paso Final: Firmas Digitales</h1>
            <p class="text-center text-gray-600 mb-8">Ambos deben firmar en sus respectivos recuadros.</p>
            
            <form id="firmaForm" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Firma Paciente 1 -->
                    <div class="card text-center">
                        <h2 class="text-xl font-bold mb-2 text-[#003366]" id="nombreFirma1">Paciente 1</h2>
                        <div class="mb-4"><canvas id="firma-canvas-1" width="300" height="150" class="firma-canvas cursor-crosshair"></canvas></div>
                        <button type="button" id="limpiarFirma1" class="text-sm text-[#003366] hover:underline">Borrar Firma</button>
                    </div>
                    <!-- Firma Paciente 2 -->
                    <div class="card text-center">
                        <h2 class="text-xl font-bold mb-2 text-[#003366]" id="nombreFirma2">Paciente 2</h2>
                        <div class="mb-4"><canvas id="firma-canvas-2" width="300" height="150" class="firma-canvas cursor-crosshair"></canvas></div>
                        <button type="button" id="limpiarFirma2" class="text-sm text-[#003366] hover:underline">Borrar Firma</button>
                    </div>
                </div>

                <div id="server-error-message" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg text-center"></div>
                <div id="success-message" class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-lg text-center"></div>
                <div class="text-center"><button type="submit" id="submitButton" class="btn-brand text-lg">Firmar y Enviar Acuerdo Conjunto</button></div>
            </form>
        </div>
    </main>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const sessionData = sessionStorage.getItem('consentimiento_parejas');
        if (!sessionData) { window.location.href = 'parejas.html'; return; }
        const datosCrudos = JSON.parse(sessionData);

        document.getElementById('nombreFirma1').textContent = `Firma de ${datosCrudos.nombreCompleto1.split(' ')[0]}`;
        document.getElementById('nombreFirma2').textContent = `Firma de ${datosCrudos.nombreCompleto2.split(' ')[0]}`;

        function setupCanvas(canvasId, clearBtnId) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            let isDrawing = false; let lastX = 0; let lastY = 0;

            const resizeCanvas = () => {
                const ratio = window.devicePixelRatio || 1;
                canvas.width = canvas.offsetWidth * ratio;
                canvas.height = canvas.offsetHeight * ratio;
                ctx.scale(ratio, ratio);
                ctx.lineWidth = 2; ctx.lineJoin = 'round'; ctx.lineCap = 'round'; ctx.strokeStyle = '#003366';
            };
            window.addEventListener('resize', resizeCanvas); resizeCanvas();

            const getEventPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                return e.touches ? { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top } : { x: e.clientX - rect.left, y: e.clientY - rect.top };
            };

            const start = (e) => { isDrawing = true; const pos = getEventPos(e); [lastX, lastY] = [pos.x, pos.y]; };
            const draw = (e) => { if (!isDrawing) return; e.preventDefault(); const pos = getEventPos(e); ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(pos.x, pos.y); ctx.stroke(); [lastX, lastY] = [pos.x, pos.y]; };
            const stop = () => isDrawing = false;

            canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', draw); canvas.addEventListener('mouseup', stop); canvas.addEventListener('mouseout', stop);
            canvas.addEventListener('touchstart', start, {passive: false}); canvas.addEventListener('touchmove', draw, {passive: false}); canvas.addEventListener('touchend', stop);
            
            document.getElementById(clearBtnId).onclick = () => ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            return {
                canvas: canvas,
                ctx: ctx,
                isEmpty: () => !new Uint32Array(ctx.getImageData(0, 0, canvas.width, canvas.height).data.buffer).some(c => c !== 0)
            };
        }

        const c1 = setupCanvas('firma-canvas-1', 'limpiarFirma1');
        const c2 = setupCanvas('firma-canvas-2', 'limpiarFirma2');

        document.getElementById('firmaForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const errDiv = document.getElementById('server-error-message');
            if (c1.isEmpty() || c2.isEmpty()) { errDiv.textContent = 'Ambos pacientes deben realizar su firma.'; errDiv.classList.remove('hidden'); return; }
            
            const submitButton = document.getElementById('submitButton');
            submitButton.disabled = true; submitButton.textContent = 'Enviando...';

            try {
                // Separamos los datos para enviarlos limpios al backend
                const finalData = {
                    tipo: 'pareja',
                    fechaDiligenciamiento: datosCrudos.fechaDiligenciamiento,
                    paciente1: {
                        nombre: datosCrudos.nombreCompleto1, email: datosCrudos.email1,
                        fechaNacimiento: datosCrudos.fechaNacimiento1, edad: datosCrudos.edad1,
                        pais: datosCrudos.pais1, departamento: datosCrudos.departamento1 || null,
                        ciudad: datosCrudos.municipio1 || datosCrudos.ciudad1 || null,
                        direccion: datosCrudos.direccion1, eps: datosCrudos.eps1, // <--- EPS Integrada
                        tipoDocumento: datosCrudos.tipoDocumento1, documentoIdentidad: datosCrudos.documentoIdentidad1,
                        telefonoContacto: datosCrudos.telefonoContacto1
                    },
                    paciente2: {
                        nombre: datosCrudos.nombreCompleto2, email: datosCrudos.email2,
                        fechaNacimiento: datosCrudos.fechaNacimiento2, edad: datosCrudos.edad2,
                        pais: datosCrudos.pais2, departamento: datosCrudos.departamento2 || null,
                        ciudad: datosCrudos.municipio2 || datosCrudos.ciudad2 || null,
                        direccion: datosCrudos.direccion2, eps: datosCrudos.eps2, // <--- EPS Integrada
                        tipoDocumento: datosCrudos.tipoDocumento2, documentoIdentidad: datosCrudos.documentoIdentidad2,
                        telefonoContacto: datosCrudos.telefonoContacto2
                    },
                    consentimiento: { fechaAceptacion: new Date().toISOString(), userAgent: navigator.userAgent },
                    firmas: { firma1: c1.canvas.toDataURL('image/png'), firma2: c2.canvas.toDataURL('image/png') }
                };

                const response = await fetch('/api/save-consent-pareja', {
                    method: 'POST', body: JSON.stringify(finalData), headers: { 'Content-Type': 'application/json' }
                });

                if (response.ok) {
                    sessionStorage.removeItem('consentimiento_parejas');
                    document.getElementById('success-message').textContent = '¡Consentimiento de pareja enviado con éxito!';
                    document.getElementById('success-message').classList.remove('hidden');
                    errDiv.classList.add('hidden');
                    submitButton.textContent = 'Enviado Correctamente';
                } else { throw new Error('Problema en el servidor.'); }
            } catch (error) {
                console.error(error); errDiv.textContent = 'Error de conexión. Intenta de nuevo.'; errDiv.classList.remove('hidden');
                submitButton.disabled = false; submitButton.textContent = 'Firmar y Enviar Acuerdo Conjunto';
            }
        });
    });
    </script>
</body>
</html>
